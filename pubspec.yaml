name: llanguage
description: LLanguage — Aplikasi Belajar Bahasa Super Lengkap
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  drift: ^2.34.1
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.6
  path: ^1.9.1
  flutter_secure_storage: ^10.3.1
  http: ^1.6.0
  flutter_tts: ^4.2.5
  flutter_local_notifications: ^22.0.1
  speech_to_text: ^7.4.0
  share_plus: ^13.2.0
  pdf: ^3.13.0
  fl_chart: ^1.2.0
  lottie: ^3.5.1
  home_widget: ^0.9.3
  html: ^0.15.6
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  uuid: ^4.5.3
  intl: ^0.20.3
  equatable: ^2.1.0
  archive: ^4.0.9
  crypto: ^3.0.7

dependency_overrides:
  js: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.2+1
  build_runner: ^2.15.1
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  riverpod_generator: ^4.0.4
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
