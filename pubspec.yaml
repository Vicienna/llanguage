name: llanguage
description: LLanguage — Aplikasi Belajar Bahasa Super Lengkap
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  http: ^1.2.1
  flutter_tts: ^4.0.2
  flutter_local_notifications: ^17.2.1
  speech_to_text: ^6.6.2
  share_plus: ^9.0.0
  pdf: ^3.11.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  home_widget: ^0.7.0
  html: ^0.15.4
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  uuid: ^4.4.1
  intl: ^0.19.0
  equatable: ^2.0.5
  archive: ^3.6.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
